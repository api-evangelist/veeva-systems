description: 'FOCUS-aligned FinOps stub for Veeva Systems: enterprise life-sciences SaaS subscription with
  no public pricing or usage/billing API.'
sources:
  - https://www.veeva.com/products/
  - https://developer.veevavault.com/api/26.1/
notes: No public pricing or billing API. Meters are not invented; API call counts are observable per-tenant
  via API Usage Logs but are not a billable line.
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Veeva Vault / CRM / Crossix / Network
  ServiceCategory: Life Sciences SaaS
  ProviderName: Veeva Systems
  PublisherName: Veeva Systems Inc.
  InvoiceIssuerName: Veeva Systems Inc.
  BillingCurrency: USD
meters:
  - name: tenant_subscription
    description: Annual Vault / CRM / Crossix / Network subscription line; sub-meters not publicly published.
    unit: varies
    aggregation: sum
  - name: api_usage_observed
    description: Observed API call count from in-product API Usage Logs. Not a billable meter.
    unit: request
    aggregation: sum
principles:
  - name: Visibility
    description: Per-tenant API telemetry is exposed through Admin > Settings > Logs > API Usage Logs
      and rate-limit response headers; cost is invoice-level only.
  - name: Allocation
    description: Allocation is contract-level per Veeva product / tenant; chargeback rides on seat / module
      scoping negotiated in the order form.
  - name: Optimization
    description: 'Optimization is scope-driven: which Vault / CRM modules are licensed, seat counts, and
      integration patterns (batch vs interactive). Renewal is the primary optimization checkpoint.'
  - name: Accountability
    description: Accountability sits with the platform owner team that holds the Veeva tenant agreement;
      finance owns the annual subscription line.
