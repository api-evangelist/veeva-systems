specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Veeva Systems
providerId: veeva-systems
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Life Sciences
  - SaaS
  - Rate Limiting
description: Veeva Vault enforces tenant-scoped API rate limiting. The Authentication API limit is keyed
  on user name + domain name; numeric ceilings are not published globally and must be discovered per
  tenant via the Auth API rate-limit response headers or the in-product API Usage Logs (Admin > Settings
  > Logs > API Usage Logs).
sources:
  - https://developer.veevavault.com/api/26.1/
limits:
  - name: Authentication API rate limit
    scope: user/domain
    metric: varies
    limit: tenant-specific; inspect Auth API response headers or API Usage Logs
    notes: Veeva documentation confirms a limit exists keyed on user name + domain but does not publish
      a numeric ceiling.
  - name: General Vault API rate limits
    scope: tenant
    metric: varies
    limit: see API Usage Logs in the Vault tenant
    notes: Burst behavior and throttling delays are tenant-configured and surfaced through response headers.
policies:
  - name: Inspect response headers
    description: Clients should read Auth API rate-limit response headers to determine remaining capacity
      and any throttling delay applied to the current call.
  - name: Consult API Usage Logs
    description: Vault administrators can review actual rate-limit behavior and throttling events under
      Admin > Settings > Logs > API Usage Logs to determine the tenant's effective limits.
